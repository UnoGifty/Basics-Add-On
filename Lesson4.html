<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Class Manipulation</title>
    <style>
        body{
            background-color: azure;
        }
        body.active {
            background-color: black;
        }
        button{
            background-color: black;
            color: azure;
            border-radius: 10px;
            padding: 13px;
            margin-top: 10px;
        }
        .white{
            background-color: azure;
            color: black;

        }
    </style>
</head>
<body> 
    <div>
        <button>Change Theme</button>
    </div>
   <script>
        let button = document.querySelector("button");
        button.addEventListener("click" , ()=> {
           let darkMode = document.querySelector("body");
           let buttonColorChange = document.querySelector("button");
           darkMode.classList.toggle("active");
           buttonColorChange.classList.toggle("white");
        })
   </script> 
</body>
</html>
