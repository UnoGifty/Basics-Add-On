<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS GRIDS</title>

    <style>
       img{
        width: 300px;
       } 

       .container{
         display: grid;
         grid-template-columns: repeat(2, 300px);
         gap: 40px;
         
       }


    </style>
</head>
<body>
    <div class="container">
        <img src="https://www.kenyasafariarcade.com/wp-content/uploads/2021/05/Nairobi.jpg" alt="Capital city of Bahamas">
               
         <img src="https://www.kenyasafariarcade.com/wp-content/uploads/2021/05/Nairobi.jpg" alt="Capital city of Bahamas">
         
         <img src="https://www.kenyasafariarcade.com/wp-content/uploads/2021/05/Nairobi.jpg" alt="Capital city of Bahamas">
               
         <img src="https://www.kenyasafariarcade.com/wp-content/uploads/2021/05/Nairobi.jpg" alt="Capital city of Bahamas">
    </div>
</body>
</html>
