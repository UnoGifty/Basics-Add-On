<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS TRANSFORM</title>
    <style>
       h1{
        background: rgba(255, 255, 255, 0.5);
        text-align: center;

       }
       img {
        width: 100%;   /* This forces the images (img) to match the size of its parent div i.e (.one, .two) */
        height: auto;
        }
       .one{
        display: block;
        margin-left: auto;
        margin-right: auto;
        margin-top: 20px;
        width: 20%;
        transform: rotate(40deg) translate(100px, 100px);
       }
       .two{
        display: block;
        margin-left: auto;
        margin-right: auto;
        margin-top: 20px;
        width: 12%;
        transform: rotate(70deg) translate(70px, 50px);
        }
       .three{
        display: block;
        margin-left: auto;
        margin-right: auto;
        margin-top: 20px;
        width: 20%;
        transform: rotate(90deg) translate(100px, 100px);
       }
       .four{
        display: block;
        margin-left: auto;
        margin-right: auto;
        margin-top: 100px;
        width: 16%;
        transform: rotate(130deg) translate(100px, 100px);
       }
    </style>
</head>
<body>
<div>
    <h1> NASSAU, BAHAMAS & NAIROBI, KENYA</h1>
    <div class="one">
        <img src="https://assets.ace.aaa.com/is/image/aceaaa/GettyImages-1688989832-coastline-paradise-island-bahamas:hero-full-width-1200x800" alt="Capital city of Bahamas">
    </div>
    <div class="two">
        <img src="https://www.kenyasafariarcade.com/wp-content/uploads/2021/05/Nairobi.jpg" alt="Capital city of Bahamas">
    </div>
    <div class="three">
        <img src="https://assets.ace.aaa.com/is/image/aceaaa/GettyImages-1688989832-coastline-paradise-island-bahamas:hero-full-width-1200x800" alt="Capital city of Bahamas">
    </div>
    <div class="four">
        <img src="https://www.kenyasafariarcade.com/wp-content/uploads/2021/05/Nairobi.jpg" alt="Capital city of Bahamas">
    </div>
</div>
  
</body>
</html>
